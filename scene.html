<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Three.js Відео Сфера</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; text-align: center; }
        #info { position: absolute; top: 20px; width: 100%; z-index: 100; pointer-events: none; }
        a { color: #00ffcc; pointer-events: auto; text-decoration: none; font-size: 18px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 5px; border: 1px solid #00ffcc; transition: 0.3s; }
        a:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>
    <div id="info">
        <a href="index.html">🔙 Повернутися</a>
    </div>

    <video id="video" loop muted autoplay playsinline crossOrigin="anonymous" style="display:none">
        <source src="video.mp4" type="video/mp4">
    </video>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        let camera, scene, renderer, video, sphere;

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 6;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222); 

            // Додаємо легке освітлення, щоб сфера виглядала об'ємною
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            video = document.getElementById('video');
            
            // Запуск відео по кліку (про всяк випадок, якщо автозапуск заблокується)
            document.body.addEventListener('click', () => { video.play(); });

            const texture = new THREE.VideoTexture(video);
            texture.colorSpace = THREE.SRGBColorSpace;

            // ЗМІНА ТУТ: Створюємо сферу замість куба
            // 2.5 - радіус, 32 і 32 - кількість сегментів (щоб сфера була гладкою)
            const geometry = new THREE.SphereGeometry(2.5, 32, 32); 
            const material = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.2 });

            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Плавне обертання сфери
            sphere.rotation.y += 0.005;
            sphere.rotation.x += 0.002;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
